apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: ai-task-ingress
  namespace: ai-task-platform

spec:
  rules:
    - host: ai-task.local

      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: frontend-service

                port:
                  number: 80