services:

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped

    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      - redis

    volumes:
      - ./backend:/app
      - /app/node_modules

  worker:
    build: ./worker
    container_name: worker

    env_file:
      - ./worker/.env

    depends_on:
      - redis

    volumes:
      - ./worker:/app

  frontend:
    build: ./frontend
    container_name: frontend

    ports:
      - "8080:80"

    depends_on:
      - backend

    volumes:
      - ./frontend:/app
      - /app/node_modules